<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botnet Detection - Live Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeIn 1s;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .status {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(0,255,0,0.2);
            border-radius: 20px;
            border: 2px solid #0f0;
            animation: pulse 2s infinite;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            animation: slideUp 0.5s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .stat-card.danger .stat-value {
            color: #ff4444;
        }

        .stat-card.warning .stat-value {
            color: #ffaa00;
        }

        .stat-card.success .stat-value {
            color: #00ff88;
        }

        .flow-stream {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            max-height: 400px;
            overflow-y: auto;
        }

        .flow-stream h2 {
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .flow-item {
            background: rgba(255,255,255,0.05);
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            border-left: 4px solid #00ff88;
            animation: slideIn 0.5s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9em;
        }

        .flow-item.botnet {
            border-left-color: #ff4444;
            background: rgba(255,68,68,0.1);
        }

        .flow-info {
            flex: 1;
        }

        .flow-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
        }

        .flow-badge.benign {
            background: #00ff88;
            color: #000;
        }

        .flow-badge.botnet {
            background: #ff4444;
            color: #fff;
        }

        .alerts {
            background: rgba(255,68,68,0.2);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #ff4444;
        }

        .alerts h2 {
            margin-bottom: 15px;
            color: #ff4444;
        }

        .alert-item {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            animation: alertPulse 1s;
        }

        .alert-item strong {
            color: #ff4444;
            font-size: 1.1em;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        @keyframes alertPulse {
            0% {
                background: rgba(255,68,68,0.3);
            }
            50% {
                background: rgba(255,68,68,0.1);
            }
            100% {
                background: rgba(0,0,0,0.3);
            }
        }

        .timestamp {
            opacity: 0.6;
            font-size: 0.85em;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛡️ Real-Time Botnet Detection System</h1>
            <div class="status">
                <span id="status">● LIVE - Monitoring Network Traffic</span>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Flows Analyzed</div>
                <div class="stat-value" id="totalFlows">0</div>
            </div>
            <div class="stat-card success">
                <div class="stat-label">Benign Traffic</div>
                <div class="stat-value" id="benignFlows">0</div>
            </div>
            <div class="stat-card danger">
                <div class="stat-label">Botnet Detected</div>
                <div class="stat-value" id="botnetFlows">0</div>
            </div>
            <div class="stat-card warning">
                <div class="stat-label">Suspicious Hosts</div>
                <div class="stat-value" id="suspiciousHosts">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Detection Rate</div>
                <div class="stat-value" id="detectionRate">0%</div>
            </div>
            <div class="stat-card danger">
                <div class="stat-label">Active Alerts</div>
                <div class="stat-value" id="activeAlerts">0</div>
            </div>
        </div>

        <div class="flow-stream">
            <h2>📊 Live Flow Stream</h2>
            <div id="flowList"></div>
        </div>

        <div class="alerts">
            <h2>⚠️ Security Alerts</h2>
            <div id="alertList"></div>
        </div>
    </div>

    <script>
        // Simulated data
        const ips = [
            '192.168.1.100', '10.0.2.15', '172.16.0.50', '192.168.0.25',
            '66.61.90.112', '125.167.3.52', '76.169.10.92', '99.45.226.110',
            '187.126.56.144', '189.141.148.12', '74.125.23.139', '183.57.48.18'
        ];

        const protocols = ['TCP', 'UDP', 'ICMP'];
        const ports = [80, 443, 22, 21, 25, 53, 8080, 3306, 5432, 27017];

        let totalFlows = 0;
        let benignFlows = 0;
        let botnetFlows = 0;
        let suspiciousHosts = 0;
        let activeAlerts = 0;
        let flowHistory = [];
        let alertHistory = [];

        function randomIP() {
            return ips[Math.floor(Math.random() * ips.length)];
        }

        function randomPort() {
            return ports[Math.floor(Math.random() * ports.length)];
        }

        function randomProtocol() {
            return protocols[Math.floor(Math.random() * protocols.length)];
        }

        function getTimestamp() {
            const now = new Date();
            return now.toLocaleTimeString();
        }

        function generateFlow() {
            const isBotnet = Math.random() < 0.35; // 35% chance of botnet
            const srcIP = randomIP();
            const dstIP = randomIP();
            const protocol = randomProtocol();
            const sport = Math.floor(Math.random() * 60000) + 1024;
            const dport = randomPort();

            totalFlows++;
            if (isBotnet) {
                botnetFlows++;
            } else {
                benignFlows++;
            }

            const flow = {
                timestamp: getTimestamp(),
                srcIP,
                dstIP,
                protocol,
                sport,
                dport,
                prediction: isBotnet ? 'Botnet' : 'Benign',
                isBotnet
            };

            flowHistory.unshift(flow);
            if (flowHistory.length > 15) {
                flowHistory.pop();
            }

            // Generate alert for botnet
            if (isBotnet && Math.random() < 0.3) {
                generateAlert(srcIP);
            }

            updateUI();
        }

        function generateAlert(ip) {
            activeAlerts++;
            suspiciousHosts = Math.min(suspiciousHosts + 1, 12);

            const alert = {
                timestamp: getTimestamp(),
                ip,
                percentage: (Math.random() * 50 + 50).toFixed(1),
                message: `High-risk botnet activity detected from ${ip}`
            };

            alertHistory.unshift(alert);
            if (alertHistory.length > 5) {
                alertHistory.pop();
            }
        }

        function updateUI() {
            // Update stats
            document.getElementById('totalFlows').textContent = totalFlows.toLocaleString();
            document.getElementById('benignFlows').textContent = benignFlows.toLocaleString();
            document.getElementById('botnetFlows').textContent = botnetFlows.toLocaleString();
            document.getElementById('suspiciousHosts').textContent = suspiciousHosts;
            document.getElementById('activeAlerts').textContent = activeAlerts;

            const rate = totalFlows > 0 ? ((botnetFlows / totalFlows) * 100).toFixed(1) : 0;
            document.getElementById('detectionRate').textContent = rate + '%';

            // Update flow list
            const flowList = document.getElementById('flowList');
            flowList.innerHTML = flowHistory.map(flow => `
                <div class="flow-item ${flow.isBotnet ? 'botnet' : ''}">
                    <div class="flow-info">
                        <strong>${flow.srcIP}:${flow.sport}</strong> → 
                        <strong>${flow.dstIP}:${flow.dport}</strong> 
                        [${flow.protocol}]
                        <span class="timestamp">${flow.timestamp}</span>
                    </div>
                    <span class="flow-badge ${flow.prediction.toLowerCase()}">${flow.prediction}</span>
                </div>
            `).join('');

            // Update alerts
            const alertList = document.getElementById('alertList');
            if (alertHistory.length === 0) {
                alertList.innerHTML = '<p style="opacity: 0.6;">No active alerts</p>';
            } else {
                alertList.innerHTML = alertHistory.map(alert => `
                    <div class="alert-item">
                        <strong>⚠️ ${alert.ip}</strong><br>
                        ${alert.message}<br>
                        <span class="timestamp">Botnet confidence: ${alert.percentage}% - ${alert.timestamp}</span>
                    </div>
                `).join('');
            }
        }

        // Start simulation
        function startSimulation() {
            // Generate initial data
            for (let i = 0; i < 10; i++) {
                generateFlow();
            }

            // Continue generating flows
            setInterval(() => {
                generateFlow();
            }, 800); // New flow every 0.8 seconds

            // Randomly update suspicious hosts
            setInterval(() => {
                suspiciousHosts = Math.max(0, suspiciousHosts + (Math.random() < 0.5 ? 1 : -1));
                updateUI();
            }, 3000);
        }

        // Start when page loads
        window.addEventListener('load', startSimulation);
    </script>
</body>
</html>
